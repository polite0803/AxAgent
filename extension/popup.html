<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eaeaea;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    .header img {
      width: 32px;
      height: 32px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #eaeaea;
      font-size: 13px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #4a90d9;
    }
    .preview {
      background: #16213e;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .preview-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }
    .preview-url {
      font-size: 11px;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .preview-excerpt {
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
      line-height: 1.4;
      max-height: 60px;
      overflow: hidden;
    }
    .btn {
      width: 100%;
      padding: 10px 16px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #3a7bc8;
    }
    .btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .status {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
    }
    .status.success {
      color: #4ade80;
    }
    .status.error {
      color: #f87171;
    }
    .settings-link {
      display: block;
      text-align: center;
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      text-decoration: none;
    }
    .settings-link:hover {
      color: #4a90d9;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AxAgent Wiki Clipper</h1>
  </div>

  <div class="form-group">
    <label for="wikiId">Wiki ID</label>
    <input type="text" id="wikiId" placeholder="Enter Wiki ID">
  </div>

  <div class="preview" id="preview">
    <div class="preview-title" id="previewTitle">Loading...</div>
    <div class="preview-url" id="previewUrl"></div>
    <div class="preview-excerpt" id="previewExcerpt"></div>
  </div>

  <button class="btn" id="clipBtn" disabled>Clip to Wiki</button>
  <div class="status" id="status"></div>

  <a href="#" class="settings-link" id="settingsLink">Extension Settings</a>

  <script src="popup.js"></script>
</body>
</html>
