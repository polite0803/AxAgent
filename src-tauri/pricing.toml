# AxAgent LLM Pricing Configuration
# Prices are per million tokens in USD. Last updated: 2026-04-30
#
# This file is the source of truth for cost estimation. Update it when
# providers change their pricing or when new models are released.
# The hardcoded fallback in agent.rs serves as a safety net if this
# file is missing or unparseable.

[budget]
# Maximum tokens per single conversation turn (0 = unlimited)
max_tokens_per_turn = 128000
# Maximum USD cost per day (0 = unlimited)
max_cost_per_day_usd = 10.0
# Maximum USD cost per conversation session (0 = unlimited)
max_cost_per_session_usd = 5.0

