name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: write-all

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # ── Validate tag matches package.json version ──────────
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Validate tag vs package.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(jq -r .version package.json)"
          if [[ "$TAG" != "$PKG_VERSION" ]]; then
            echo "❌ Tag $TAG does not match package.json $PKG_VERSION"
            exit 1
          fi
          echo "✅ Version $TAG is consistent"

  # ── Generate release notes via git-cliff ─────────────
  draft-release-notes:
    name: Generate Release Notes
    needs: [check-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          CLIFF_REPO: ${{ github.repository }}

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'AxAgent ${{ github.ref_name }}'
          body: ${{ steps.cliff.outputs.content }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Build for macOS / Windows / Linux x86_64 ───────────
  release:
    name: Build (${{ matrix.target }})
    needs: [check-version, draft-release-notes]
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          # Linux x86_64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: '${{ matrix.os }}-${{ matrix.target }}'
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpipewire-0.3-dev

      - name: Install x86_64 OpenSSL (macOS Intel cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          arch -x86_64 brew install openssl@3
          echo "OPENSSL_DIR=$(arch -x86_64 brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(arch -x86_64 brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(arch -x86_64 brew --prefix openssl@3)/lib" >> $GITHUB_ENV

      - name: Install Protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install Protoc (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Protoc (Windows)
        if: matrix.os == 'windows-latest'
        uses: arduino/setup-protoc@v3
        with:
          version: '27.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 使用npm包替代本地构建的依赖

      - name: Install frontend dependencies
        run: npm install

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os == 'macos-latest' && '-' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AxAgent ${{ github.ref_name }}'
          releaseBody: ${{ needs.draft-release-notes.outputs.body }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true

      - name: Package Windows artifacts
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          # 打包便携版
          $exe = "src-tauri/target/${{ matrix.target }}/release/AxAgent.exe"
          $arch = if ("${{ matrix.target }}" -match "aarch64") { "arm64" } else { "x64" }
          $zipName = "AxAgent_${{ github.ref_name }}_windows-${arch}-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zipName
          
          # 重命名MSI安装包
          $msiPath = "src-tauri/target/${{ matrix.target }}/release/bundle/msi"
          if (Test-Path $msiPath) {
            cd $msiPath
            $msiFiles = Get-ChildItem -Filter "*.msi"
            foreach ($msi in $msiFiles) {
              $newMsiName = "AxAgent_${{ github.ref_name }}_windows-${arch}.msi"
              Rename-Item -Path $msi.Name -NewName $newMsiName
              Move-Item -Path $newMsiName -Destination "../../../$newMsiName"
            }
          }

      - name: Package Linux x86_64 artifacts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          # 处理deb包
          if [ -d "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb" ]; then
            cd src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb
            for deb in *.deb; do
              new_name="AxAgent_${{ github.ref_name }}_linux-x64.deb"
              mv "$deb" "$new_name"
              mv "$new_name" "../../../$new_name"
            done
          fi
          
          # 处理rpm包（如果存在）
          if [ -d "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm" ]; then
            cd src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm
            for rpm in *.rpm; do
              new_name="AxAgent_${{ github.ref_name }}_linux-x64.rpm"
              mv "$rpm" "$new_name"
              mv "$new_name" "../../../$new_name"
            done
          fi

      - name: Upload Windows artifacts to release
        if: contains(matrix.target, 'windows')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            AxAgent_${{ github.ref_name }}_windows-*-portable.zip
            src-tauri/target/${{ matrix.target }}/release/AxAgent_${{ github.ref_name }}_windows-*.msi

      - name: Package macOS artifacts
        if: contains(matrix.target, 'apple-darwin')
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/dmg
          for dmg in *.dmg; do
            if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
              new_name="AxAgent_${{ github.ref_name }}_macos-arm64.dmg"
            else
              new_name="AxAgent_${{ github.ref_name }}_macos-x64.dmg"
            fi
            mv "$dmg" "$new_name"
            mv "$new_name" "../../../$new_name"
          done

      - name: Upload Linux x86_64 artifacts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/AxAgent_${{ github.ref_name }}_linux-x64.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/AxAgent_${{ github.ref_name }}_linux-x64.rpm

      - name: Upload macOS artifacts
        if: contains(matrix.target, 'apple-darwin')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            src-tauri/target/${{ matrix.target }}/release/AxAgent_${{ github.ref_name }}_macos-*.dmg

  # ── Build for Linux ARM64 (cross-compile) ──────────────
  release-linux-arm:
    name: Build (aarch64-unknown-linux-gnu)
    needs: [check-version, draft-release-notes]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: 'ubuntu-22.04-aarch64-unknown-linux-gnu'
          workspaces: src-tauri -> target

      - name: Setup cross-compilation sources
        run: |
          cat > /tmp/sources.list << 'EOF'
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy main multiverse universe restricted
          deb [arch=amd64,i386] http://security.ubuntu.com/ubuntu jammy-security main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-updates main multiverse universe restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main multiverse universe restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main multiverse universe restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main multiverse universe restricted
          EOF
          sudo mv /etc/apt/sources.list /etc/apt/sources.list.bak
          sudo mv /tmp/sources.list /etc/apt/sources.list
          sudo dpkg --add-architecture arm64
          sudo apt-get update

      - name: Install ARM64 dependencies
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libssl-dev:arm64 \
            libpipewire-0.3-dev:arm64 \
            patchelf:arm64 \
            protobuf-compiler:arm64

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Build for Linux ARM64
        run: |
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig/:$PKG_CONFIG_PATH
          export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu/
          npm run tauri build -- --target aarch64-unknown-linux-gnu --bundles deb,rpm
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package Linux ARM64 artifacts
        run: |
          # 处理deb包
          if [ -d "src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb" ]; then
            cd src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb
            for deb in *.deb; do
              new_name="AxAgent_${{ github.ref_name }}_linux-arm64.deb"
              mv "$deb" "$new_name"
              mv "$new_name" "../../../$new_name"
            done
          fi
          
          # 处理rpm包（如果存在）
          if [ -d "src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm" ]; then
            cd src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm
            for rpm in *.rpm; do
              new_name="AxAgent_${{ github.ref_name }}_linux-arm64.rpm"
              mv "$rpm" "$new_name"
              mv "$new_name" "../../../$new_name"
            done
          fi

      - name: Upload Linux ARM64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'AxAgent ${{ github.ref_name }}'
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/AxAgent_${{ github.ref_name }}_linux-arm64.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/AxAgent_${{ github.ref_name }}_linux-arm64.rpm

  # ── Publish draft release as latest ────────────────────
  publish-release:
    name: Publish Release
    needs: [release, release-linux-arm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy website after release ────────────────────────
  deploy-website:
    name: Deploy Website
    needs: [publish-release]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-website.yml',
              ref: 'master',
            });