name: Test Windows Build

on:
  push:
    tags:
      - 'test-windows-v*.*.*'

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build (x86_64-pc-windows-msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: 'windows-latest-x86_64-pc-windows-msvc'
          workspaces: src-tauri -> target

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get linked dependency versions
        id: dep-versions
        shell: bash
        run: |
          SM_SHA=$(git ls-remote https://github.com/polite0803/stream-monaco.git refs/heads/main | cut -f1)
          MS_SHA=$(git ls-remote https://github.com/polite0803/markstream-vue.git refs/heads/axagent-custom | cut -f1)
          echo "cache-key=linked-deps-${SM_SHA:0:12}-${MS_SHA:0:12}" >> $GITHUB_OUTPUT

      - name: Cache linked dependencies
        id: cache-linked-deps
        uses: actions/cache@v4
        with:
          path: |
            ../stream-monaco
            ../markstream-vue
          key: ${{ steps.dep-versions.outputs.cache-key }}

      - name: Build linked dependencies
        if: steps.cache-linked-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd ..

          git clone --depth 1 https://github.com/polite0803/stream-monaco.git stream-monaco
          cd stream-monaco && pnpm install --frozen-lockfile && pnpm build
          rm -rf .git
          cd ..

          git clone --depth 1 -b axagent-custom https://github.com/polite0803/markstream-vue.git markstream-vue
          cd markstream-vue && pnpm install --frozen-lockfile
          pnpm run build:parser
          cd packages/markstream-react && pnpm build && cd ../..
          rm -rf .git playground*/node_modules
          cd ..

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0.6
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AxAgent Test ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: true
          tauriScript: pnpm tauri
          args: --target x86_64-pc-windows-msvc

      - name: Package Windows portable (zip)
        shell: pwsh
        run: |
          $exe = "src-tauri/target/x86_64-pc-windows-msvc/release/AxAgent.exe"
          $zipName = "AxAgent_${{ github.ref_name }}_windows-x64-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zipName

      - name: Upload Windows portable to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: AxAgent_${{ github.ref_name }}_windows-x64-portable.zip
