name: Pull Request CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*.*.*'
      - 'test-v*.*.*'

permissions: write-all

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # ── Frontend linting and type checking ────────────────
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 使用npm包替代本地构建的依赖

      - name: Install frontend dependencies
        run: npm install

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

  # ── Rust formatting and clippy ─────────────────────────
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    container:
      image: rust:1.75
    steps:
      - uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: |
          rustup component add rustfmt
          cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: |
          rustup component add clippy
          cargo clippy --all-targets --all-features -- -D warnings --manifest-path src-tauri/Cargo.toml

      - name: Check build
        run: cargo check --workspace --manifest-path src-tauri/Cargo.toml

  # ── Unit tests ─────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: 'ubuntu-latest-unit-tests'
          workspaces: src-tauri -> target

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libpipewire-0.3-dev libwayland-dev

      - name: Run Rust tests
        run: cargo test --workspace --manifest-path src-tauri/Cargo.toml

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 使用npm包替代本地构建的依赖

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npm run test:run

  # ── E2E tests on macOS ─────────────────────────────────
  test-e2e:
    name: E2E Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: 'macos-latest-e2e-tests'
          workspaces: src-tauri -> target

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 使用npm包替代本地构建的依赖

      - name: Install frontend dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build Tauri app
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: Run E2E tests
        run: npm run test:e2e