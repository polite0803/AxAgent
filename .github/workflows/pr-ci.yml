name: Pull Request CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*.*.*'
      - 'test-v*.*.*'

permissions: write-all

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  # ── Frontend linting and type checking ────────────────
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get linked dependency versions
        id: dep-versions
        shell: bash
        run: |
          SM_SHA=$(git ls-remote https://github.com/polite0803/stream-monaco.git refs/heads/main | cut -f1)
          MS_SHA=$(git ls-remote https://github.com/polite0803/markstream-vue.git refs/heads/axagent-custom | cut -f1)
          echo "cache-key=linked-deps-${SM_SHA:0:12}-${MS_SHA:0:12}" >> $GITHUB_OUTPUT

      - name: Cache linked dependencies
        id: cache-linked-deps
        uses: actions/cache@v4
        with:
          path: |
            ../stream-monaco
            ../markstream-vue
          key: ${{ steps.dep-versions.outputs.cache-key }}

      - name: Build linked dependencies
        if: steps.cache-linked-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd ..

          git clone --depth 1 https://github.com/polite0803/stream-monaco.git stream-monaco
          cd stream-monaco && pnpm install --frozen-lockfile && pnpm build
          rm -rf .git
          cd ..

          git clone --depth 1 -b axagent-custom https://github.com/polite0803/markstream-vue.git markstream-vue
          cd markstream-vue && pnpm install --frozen-lockfile
          pnpm run build:parser
          cd packages/markstream-react && pnpm build && cd ../..
          rm -rf .git playground*/node_modules
          cd ..

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build

  # ── Rust formatting and clippy ─────────────────────────
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    container:
      image: rust:1.75
    steps:
      - uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: |
          rustup component add rustfmt
          cargo fmt --check

      - name: Clippy
        run: |
          rustup component add clippy
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Check build
        run: cargo check --workspace

  # ── Unit tests ─────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: 'ubuntu-latest-unit-tests'
          workspaces: src-tauri -> target

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Rust tests
        run: cargo test --workspace

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get linked dependency versions
        id: dep-versions
        shell: bash
        run: |
          SM_SHA=$(git ls-remote https://github.com/polite0803/stream-monaco.git refs/heads/main | cut -f1)
          MS_SHA=$(git ls-remote https://github.com/polite0803/markstream-vue.git refs/heads/axagent-custom | cut -f1)
          echo "cache-key=linked-deps-${SM_SHA:0:12}-${MS_SHA:0:12}" >> $GITHUB_OUTPUT

      - name: Cache linked dependencies
        id: cache-linked-deps
        uses: actions/cache@v4
        with:
          path: |
            ../stream-monaco
            ../markstream-vue
          key: ${{ steps.dep-versions.outputs.cache-key }}

      - name: Build linked dependencies
        if: steps.cache-linked-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd ..

          git clone --depth 1 https://github.com/polite0803/stream-monaco.git stream-monaco
          cd stream-monaco && pnpm install --frozen-lockfile && pnpm build
          rm -rf .git
          cd ..

          git clone --depth 1 -b axagent-custom https://github.com/polite0803/markstream-vue.git markstream-vue
          cd markstream-vue && pnpm install --frozen-lockfile
          pnpm run build:parser
          cd packages/markstream-react && pnpm build && cd ../..
          rm -rf .git playground*/node_modules
          cd ..

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test:run

  # ── E2E tests on macOS ─────────────────────────────────
  test-e2e:
    name: E2E Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1'
          key: 'macos-latest-e2e-tests'
          workspaces: src-tauri -> target

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get linked dependency versions
        id: dep-versions
        run: |
          SM_SHA=$(git ls-remote https://github.com/polite0803/stream-monaco.git refs/heads/main | cut -f1)
          MS_SHA=$(git ls-remote https://github.com/polite0803/markstream-vue.git refs/heads/axagent-custom | cut -f1)
          echo "cache-key=linked-deps-${SM_SHA:0:12}-${MS_SHA:0:12}" >> $GITHUB_OUTPUT

      - name: Cache linked dependencies
        id: cache-linked-deps
        uses: actions/cache@v4
        with:
          path: |
            ../stream-monaco
            ../markstream-vue
          key: ${{ steps.dep-versions.outputs.cache-key }}

      - name: Build linked dependencies
        if: steps.cache-linked-deps.outputs.cache-hit != 'true'
        run: |
          cd ..

          git clone --depth 1 https://github.com/polite0803/stream-monaco.git stream-monaco
          cd stream-monaco && pnpm install --frozen-lockfile && pnpm build
          rm -rf .git
          cd ..

          git clone --depth 1 -b axagent-custom https://github.com/polite0803/markstream-vue.git markstream-vue
          cd markstream-vue && pnpm install --frozen-lockfile
          pnpm run build:parser
          cd packages/markstream-react && pnpm build && cd ../..
          rm -rf .git playground*/node_modules
          cd ..

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install chromium

      - name: Build Tauri app
        run: pnpm tauri build --target aarch64-apple-darwin
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: Run E2E tests
        run: pnpm test:e2e
