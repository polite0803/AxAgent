name: 🐛 提交 BUG
description: 报告一个 Bug 以帮助我们改进
labels: ["bug"]
body:
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: 系统架构
      options:
        - x86_64 (Intel/AMD)
        - aarch64 (ARM/Apple Silicon)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AxAgent 版本
      placeholder: "例如：v1.0.0，可在设置中查看"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      placeholder: 请清楚地描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 第一步
        2. 第二步
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: 描述你期望看到的正确行为
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: 描述实际发生的错误行为
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 日志
      placeholder: 可选：附上截图或相关错误日志
    validations:
      required: false
